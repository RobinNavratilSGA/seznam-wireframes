/* ─── Shared Components ─── */

const Badge = ({ tone = 'neutral', children }) => {
  const tones = {
    success: 'bg-p-success-surface text-p-text',
    warning: 'bg-p-warning-surface text-p-text',
    critical: 'bg-p-critical-surface text-p-text',
    info: 'bg-p-info-surface text-p-text',
    neutral: 'bg-p-badge-neutral text-p-text',
  };
  return (
    <span className={`inline-flex items-center px-2 py-[2px] rounded-p-badge text-p-badge ${tones[tone] || tones.neutral}`}>
      {children}
    </span>
  );
};

const Button = ({ variant = 'secondary', size = 'default', onClick, children, className = '' }) => {
  const base = 'inline-flex items-center justify-center rounded-p-btn text-p-btn font-[550] transition-colors';
  const pad = size === 'slim' ? 'px-2 py-1' : 'px-3 py-[6px]';
  const variants = {
    primary: 'bg-p-btn-primary text-white hover:bg-p-btn-primary-hover',
    secondary: 'bg-p-surface border border-p-btn-secondary-border text-p-text hover:bg-p-bg',
    critical: 'bg-p-critical-text text-white hover:bg-[#b52312]',
    'critical-secondary': 'bg-p-surface border border-p-critical-text text-p-critical-text hover:bg-p-critical-bg',
    plain: 'text-p-interactive hover:underline bg-transparent p-0',
  };
  return (
    <button onClick={onClick} className={`${base} ${pad} ${variants[variant] || variants.secondary} ${className}`}>
      {children}
    </button>
  );
};

const Banner = ({ tone = 'info', heading, children }) => {
  const tones = {
    warning: 'bg-p-warning-bg',
    critical: 'bg-p-critical-bg',
    success: 'bg-p-success-bg',
    info: 'bg-p-info-bg',
  };
  const icons = {
    warning: <svg className="w-5 h-5 text-p-warning-text flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
    critical: <svg className="w-5 h-5 text-p-critical-text flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>,
    success: <svg className="w-5 h-5 text-p-success-text flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>,
    info: <svg className="w-5 h-5 text-p-interactive flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd" /></svg>,
  };
  return (
    <div className={`rounded-p-card p-4 ${tones[tone] || tones.info}`}>
      <div className="flex gap-3">
        {icons[tone]}
        <div className="flex-1">
          {heading && <div className="text-p-heading text-p-text mb-1">{heading}</div>}
          {children}
        </div>
      </div>
    </div>
  );
};

const Section = ({ title, padding = true, action, children }) => (
  <div className={`bg-p-surface rounded-p-card shadow-p-card ${padding ? 'p-4' : ''}`}>
    {(title || action) && (
      <div className={`flex items-center justify-between ${padding ? 'mb-3' : 'px-4 pt-4 pb-3'}`}>
        {title && <h2 className="text-p-heading text-p-text">{title}</h2>}
        {action}
      </div>
    )}
    {children}
  </div>
);

const Toggle = ({ checked = false, size = 'default' }) => {
  const w = size === 'small' ? 'w-[36px] h-[20px]' : 'w-[36px] h-[20px]';
  return (
    <div className={`relative ${w} rounded-[10px] ${checked ? 'bg-p-toggle-on' : 'bg-p-toggle-off'} cursor-pointer flex-shrink-0`}>
      <div className={`absolute top-[2px] w-4 h-4 bg-white rounded-full transition-transform shadow-sm ${checked ? 'left-[18px]' : 'left-[2px]'}`}></div>
    </div>
  );
};

const TextField = ({ placeholder, value, icon, label }) => (
  <div>
    {label && <label className="block text-p-base text-p-text font-[550] mb-1">{label}</label>}
    <div className="relative">
      {icon && <div className="absolute left-3 top-1/2 -translate-y-1/2 text-p-text-disabled">{icon}</div>}
      <input
        type="text"
        placeholder={placeholder}
        defaultValue={value}
        className={`w-full border border-p-text-disabled rounded-p-input py-2 text-p-base text-p-text placeholder:text-p-text-disabled focus:border-p-focus focus:ring-1 focus:ring-p-focus focus:outline-none ${icon ? 'pl-9 pr-3' : 'px-3'}`}
      />
    </div>
  </div>
);

const Select = ({ options, label, className = '' }) => (
  <div>
    {label && <label className="block text-p-base text-p-text font-[550] mb-1">{label}</label>}
    <select className={`border border-p-text-disabled rounded-p-input px-3 py-2 text-p-base text-p-text focus:border-p-focus focus:ring-1 focus:ring-p-focus focus:outline-none bg-white ${className}`}>
      {options.map((opt, i) => <option key={i} value={opt.value || opt}>{opt.label || opt}</option>)}
    </select>
  </div>
);

const HelpFooter = () => (

    <p className="text-p-base text-p-text-disabled">

      <a href="#" className="text-p-interactive hover:underline">Dokumentace</a> · {' '}
      <a href="#" className="text-p-interactive hover:underline">Podpora Seznam.cz</a> · {' '}
      <a href="#" className="text-p-interactive hover:underline">Kontaktujte nás</a>

  </div>
);

const SearchIcon = () => (

const CheckIcon = () => (

const WarningIcon = () => (
  <svg className="w-4 h-4 text-p-warning-text flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">

const CloseIcon = () => (

    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />

/* ─── Main App ─── */

const SeznamAppWireframes = () => {

      </div>

      {/* Screen Selector */}
      <div className="bg-p-surface border-b border-p-border px-4 py-3 sticky top-0 z-50">

          <span className="text-p-base text-p-text-disabled ml-auto">Sales Channel</span>
        </div>
        <div className="flex flex-wrap gap-1">
          {screens.map((screen) => (
            <button
              key={screen.id}
              onClick={() => setCurrentScreen(screen.id)}
              className={`px-3 py-[6px] rounded-p-btn text-p-btn font-[550] transition-colors ${
                currentScreen === screen.id
                  ? 'bg-p-btn-primary text-white'
                  : 'bg-p-bg text-p-text hover:bg-p-border'
              }`}
            >
              {screen.label}
            </button>
          ))}
        </div>
      </div>

      {/* Sidebar + Content Layout */}
      <div className="flex">
        {/* Simulated Shopify Admin Sidebar — this is admin chrome, NOT part of app code. Sub-nav uses App Bridge s-app-nav / NavMenu */}
        <div className="hidden md:block w-[210px] bg-p-sidebar min-h-screen p-3 text-p-sidebar-text text-p-base space-y-0.5 flex-shrink-0">
          <div className="text-p-text-disabled uppercase text-[10px] font-[650] tracking-wider mb-2 mt-2 px-2">Sales channels</div>

          <div className="flex items-center gap-2 px-2 py-1.5 rounded-md bg-p-sidebar-active text-white cursor-pointer">
            <span className="w-4 h-4 bg-[#5C6AC4] rounded-[3px] flex items-center justify-center text-white text-[8px] font-[650]">O</span>
            Online Store
          </div>

          <div
            onClick={() => setCurrentScreen(currentScreen === 'intro' ? 'intro' : 'overview')}
            className={`flex items-center gap-2 px-2 py-1.5 rounded-md cursor-pointer transition-colors ${currentScreen !== 'intro' ? 'bg-p-sidebar-active text-white' : 'text-p-sidebar-text hover:bg-p-sidebar-active/50'}`}
          >
            <div className="w-4 h-4 bg-red-600 rounded-[3px] flex items-center justify-center">
              <span className="text-white text-[8px] font-[650]">S</span>
            </div>
            Seznam.cz
          </div>

          {currentScreen !== 'intro' && (
            <div className="ml-6 space-y-0.5 text-[12px]">
              <div onClick={() => setCurrentScreen('overview')} className={`px-2 py-1 rounded-md cursor-pointer transition-colors ${currentScreen === 'overview' ? 'text-white bg-p-sidebar-active' : 'text-p-sidebar-text hover:text-white'}`}>Přehled</div>
              <div onClick={() => setCurrentScreen('products')} className={`px-2 py-1 rounded-md cursor-pointer transition-colors ${currentScreen === 'products' ? 'text-white bg-p-sidebar-active' : 'text-p-sidebar-text hover:text-white'}`}>Produkty</div>
              <div onClick={() => setCurrentScreen('settings')} className={`px-2 py-1 rounded-md cursor-pointer transition-colors ${currentScreen === 'settings' ? 'text-white bg-p-sidebar-active' : 'text-p-sidebar-text hover:text-white'}`}>Nastavení</div>
            </div>
          )}

          <div className="flex items-center gap-2 px-2 py-1.5 text-p-sidebar-text hover:bg-p-sidebar-active/50 rounded-md cursor-pointer">
            <span className="w-4 h-4 bg-[#50B83C] rounded-[3px] flex items-center justify-center text-white text-[8px] font-[650]">S</span>
            Shop

          <div className="px-2 py-1.5 text-p-sidebar-text hover:bg-p-sidebar-active/50 rounded-md cursor-pointer">Shopify Flow</div>
        </div>

        {/* Main Content — s-page */}
        <div className="flex-1 px-5 py-4 max-w-[998px] mx-auto">
          {currentScreen === 'intro' && <IntroductionScreen onNavigate={setCurrentScreen} />}
          {currentScreen === 'onboarding' && <OnboardingScreen onNavigate={setCurrentScreen} />}
          {currentScreen === 'overview' && <OverviewScreen onNavigate={setCurrentScreen} />}
          {currentScreen === 'products' && <ProductsScreen onNavigate={setCurrentScreen} />}
          {currentScreen === 'settings' && <SettingsScreen onNavigate={setCurrentScreen} />}
        </div>
      </div>
    </div>
  );
};
